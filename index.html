<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖤 روليت المخمل الأسود - النسخة الكاملة الفاخرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% 30%, #16061a 0%, #08030b 70%, #010003 100%);
            min-height: 100vh; 
            color: #f3f4f6;
            overflow-x: hidden;
        }

        .neon-glow {
            box-shadow: 0 0 30px rgba(219, 39, 119, 0.2), inset 0 0 20px rgba(219, 39, 119, 0.05);
        }
        .luxury-card { 
            background: rgba(14, 8, 18, 0.85); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(219, 39, 119, 0.15); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }
        
        .fancy-input { 
            width: 100%; 
            padding: 1.1rem 1.3rem; 
            background: rgba(4, 2, 6, 0.7); 
            border: 1px solid rgba(219, 39, 119, 0.25); 
            border-radius: 14px; 
            color: #fff; 
            outline: none; 
            transition: all .4s ease; 
        }
        .fancy-input:focus { 
            border-color: #db2777; 
            box-shadow: 0 0 20px rgba(219, 39, 119, 0.35); 
            background: rgba(219, 39, 119, 0.05); 
        }

        .btn-luxury { 
            background: linear-gradient(135deg, #6b1170, #db2777, #4c0519); 
            border-radius: 14px; 
            font-weight: 700; 
            box-shadow: 0 5px 25px rgba(219, 39, 119, 0.35); 
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-luxury:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 35px rgba(219, 39, 119, 0.55); 
        }

        .wheel-wrapper { position: relative; width: 230px; height: 230px; margin: 0 auto; }
        .wheel-ring { 
            position: absolute; inset: 0; border-radius: 50%; 
            background: conic-gradient(
                #1a0920 0deg 90deg, #450627 90deg 180deg, 
                #0f0313 180deg 270deg, #75143b 270deg 360deg
            ); 
            border: 5px solid #ca8a04; 
            box-shadow: 0 0 35px rgba(202, 138, 4, 0.2);
            transition: transform 3.5s cubic-bezier(0.1, 0.85, 0.25, 1); 
        }
        .wheel-center { 
            position: absolute; inset: 15px; border-radius: 50%; 
            background: radial-gradient(circle, #27052c, #07010b); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: 2px solid rgba(202, 138, 4, 0.3); z-index: 5; 
        }
        .btn-spin { 
            background: linear-gradient(135deg, #ca8a04, #eab308, #854d0e); 
            color: #000; border-radius: 50%; width: 85px; height: 85px;
            font-weight: 900; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(202, 138, 4, 0.4); 
            transition: all .3s; border: 2px solid #000;
        }
        .btn-spin:hover { transform: scale(1.06); box-shadow: 0 6px 25px rgba(202, 138, 4, 0.7); }

        .command-box {
            font-size: 1.25rem; line-height: 1.9; 
            background: linear-gradient(to bottom, rgba(13, 5, 18, 0.95), rgba(4, 2, 6, 0.98)); 
            border-radius: 20px; padding: 2rem; text-align: center; color: #f3f4f6; 
            border: 1px solid rgba(219, 39, 119, 0.3);
            animation: fadeIn 0.5s ease-out;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.12); transition: all .4s; cursor: pointer; }
        .dot.active { background: #db2777; box-shadow: 0 0 15px #db2777; transform: scale(1.3); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="relative z-10 w-full max-w-md my-auto">
        <div class="text-center py-5">
            <h1 class="text-3xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-pink-400 via-purple-300 to-amber-400">روليت المَخمل الأسود</h1>
            <p class="text-gray-400 text-xs mt-2 tracking-wider">أجواء فندقية غامضة ومثيرة • منع التكرار التام والفصل الجندري</p>
        </div>

        <div id="setup" class="luxury-card rounded-3xl p-6 neon-glow">
            <h2 class="text-lg font-bold text-center mb-6 text-amber-400"><i class="fa-solid fa-whiskey-glass ml-2"></i> إعداد اللقاء الخاص</h2>
            <div class="space-y-4">
                <div>
                    <label class="block mb-1.5 text-gray-400 text-xs font-semibold">اسم الطرف الأول</label>
                    <input id="p1name" type="text" value="الزوج" class="fancy-input">
                </div>
                <div>
                    <label class="block mb-1.5 text-gray-400 text-xs font-semibold">الجنس</label>
                    <select id="p1gender" class="fancy-input">
                        <option value="مذكر" selected>مذكر (رجل)</option>
                        <option value="مؤنث">مؤنث (امرأة)</option>
                    </select>
                </div>
                <div class="py-1 flex justify-center"><div class="w-1/3 border-b border-gray-800"></div></div>
                <div>
                    <label class="block mb-1.5 text-gray-400 text-xs font-semibold">اسم الطرف الثاني</label>
                    <input id="p2name" type="text" value="الزوجة" class="fancy-input">
                </div>
                <div>
                    <label class="block mb-1.5 text-gray-400 text-xs font-semibold">الجنس</label>
                    <select id="p2gender" class="fancy-input">
                        <option value="مؤنث" selected>مؤنث (امرأة)</option>
                        <option value="مذكر">مذكر (رجل)</option>
                    </select>
                </div>
            </div>
            <button onclick="startGame()" class="btn-luxury w-full py-4 mt-8 text-white font-bold text-base transition-all">
                ابدأ الليلة المثيرة 🍷
            </button>
        </div>

        <div id="game" class="hidden space-y-5">
            <div class="flex justify-between items-center">
                <button onclick="showSetup()" class="luxury-card px-4 py-2 rounded-xl text-xs text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-sliders ml-1"></i> الأسماء
                </button>
                <div id="stageTitle" class="luxury-card px-5 py-2 rounded-full text-xs text-amber-400 font-bold tracking-wide border border-amber-500/20"></div>
            </div>

            <div id="currentTurn" class="luxury-card rounded-2xl p-4 text-center text-sm font-medium border-l-4 border-pink-500"></div>

            <div class="flex gap-3 justify-center py-1" id="progressDots">
                <div class="dot active" data-stage="1" onclick="jumpStage(1)"></div>
                <div class="dot" data-stage="2" onclick="jumpStage(2)"></div>
                <div class="dot" data-stage="3" onclick="jumpStage(3)"></div>
                <div class="dot" data-stage="4" onclick="jumpStage(4)"></div>
            </div>

            <div class="luxury-card rounded-3xl p-8 flex flex-col items-center justify-center neon-glow relative">
                <div class="absolute top-4 text-amber-500 text-xl z-20"><i class="fa-solid fa-caret-down"></i></div>
                <div class="wheel-wrapper">
                    <div class="wheel-ring" id="wheelRing"></div>
                    <div class="wheel-center">
                        <button class="btn-spin" id="spinBtn" onclick="spinRoulette()">لف</button>
                    </div>
                </div>
            </div>

            <div id="result" class="hidden">
                <div class="command-box shadow-2xl relative">
                    <div id="playerName" class="text-xs font-bold tracking-widest uppercase mb-4 text-amber-500"></div>
                    <div id="commandText" class="font-medium text-gray-100"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="newCommand()" class="luxury-card py-3.5 rounded-xl text-xs font-bold text-gray-300 hover:text-white transition"><i class="fa-solid fa-shuffle mb-1 block text-base text-purple-400"></i> مَهمة أخرى</button>
                <button onclick="changeStage()" class="luxury-card py-3.5 rounded-xl text-xs font-bold text-gray-300 hover:text-white transition"><i class="fa-solid fa-forward-step mb-1 block text-base text-pink-400"></i> تخطي المرحلة</button>
                <button onclick="resetAllHistory()" class="luxury-card py-3.5 rounded-xl text-xs font-bold text-red-400/80 hover:text-red-400 transition"><i class="fa-solid fa-trash-can mb-1 block text-base text-red-500/70"></i> تصفير الذاكرة</button>
            </div>
            
            <div class="text-center text-[10px] text-gray-600 tracking-wider font-mono" id="poolStatus"></div>
        </div>
    </div>

        let currentStage = 1;
        let isSpinning = false;
        let currentRotation = 0;
        let players = { p1: { name: "", gender: "" }, p2: { name: "", gender: "" } };
        let currentTurn = 'p1'; 
        let currentRoundPool = { 1: [], 2: [], 3: [], 4: [] };

        function getHistory() {
            let history = localStorage.getItem('luxury_complete_history');
            return history ? JSON.parse(history) : [];
        }

        function saveToHistory(text) {
            let history = getHistory();
            if (!history.includes(text)) {
                history.push(text);
                localStorage.setItem('luxury_complete_history', JSON.stringify(history));
            }
        }

        function clearHistory() { 
            localStorage.removeItem('luxury_complete_history'); 
        }

        function startGame() {
            const p1n = document.getElementById('p1name').value.trim();
            const p2n = document.getElementById('p2name').value.trim();
            if (!p1n || !p2n) return alert("يرجى ملء أسماء العشاق أولاً");

            players.p1.name = p1n;
            players.p1.gender = document.getElementById('p1gender').value;
            players.p2.name = p2n;
            players.p2.gender = document.getElementById('p2gender').value;

            generateRoundPools();

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');

            updateStageTitle();
            updateTurnDisplay();
            updateProgressDots();
            showPoolStatus();
        }

        function generateRoundPools() {
            const history = getHistory();
            
            for (let s = 1; s <= 4; s++) {
                let p1Available = STRICT_DATABASE[s][players.p1.gender] || [];
                let p2Available = STRICT_DATABASE[s][players.p2.gender] || [];
                let allPossible = [...p1Available, ...p2Available];
                
                // استبعاد التكرار التاريخي المخزن بـ localStorage
                let freshQuestions = allPossible.filter(q => !history.includes(q));
                
                // إعادة تدوير الأسئلة في حال استنفاد قاعدة البيانات كاملة لضمان استمرار اللعب دون توقف الكود
                if (freshQuestions.length === 0) {
                    freshQuestions = [...allPossible];
                }

                // خلط العناصر عشوائياً
                freshQuestions.sort(() => Math.random() - 0.5);

                if (s === 4) {
                    // المرحلة الرابعة تأخذ وضعية واحدة فقط في كل مرة كما طلبت
                    currentRoundPool[s] = freshQuestions.slice(0, 1);
                } else {
                    // المراحل الباقية تسحب باقة من 8 أسئلة فقط
                    currentRoundPool[s] = freshQuestions.slice(0, 8);
                }
            }
        }

        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').classList.add('hidden');

            const extraDeg = Math.floor(Math.random() * 360) + 2160; 
            currentRotation += extraDeg;
            document.getElementById('wheelRing').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                displayResult();
            }, 3500);
        }

        function displayResult() {
            const activePlayer = players[currentTurn];
            const partnerPlayer = currentTurn === 'p1' ? players.p2 : players.p1;
            let stagePool = currentRoundPool[currentStage];

            if (!stagePool || stagePool.length === 0) {
                document.getElementById('playerName').innerText = `انتهت باقة المرحلة لـ [ ${activePlayer.name} ]`;
                document.getElementById('commandText').innerText = "تم استهلاك الأسئلة المخصصة لهذه المرحلة في الجولة الحالية بنجاح. يرجى الانتقال للمرحلة التالية بالزر أدناه لتوليد مهام جديدة تماماً وبدون تكرار.";
                document.getElementById('result').classList.remove('hidden');
                return;
            }

            // البحث عن سؤال يطابق جنس اللاعب من الباقة
            let foundIndex = -1;
            let dbGenderData = STRICT_DATABASE[currentStage][activePlayer.gender] || [];

            for (let i = 0; i < stagePool.length; i++) {
                if (dbGenderData.includes(stagePool[i])) { 
                    foundIndex = i; 
                    break; 
                }
            }
            
            // إن لم يعثر على سؤال مخصص ومناسب يسحب العنصر الأول
            if (foundIndex === -1) foundIndex = 0;

            let rawQuestion = stagePool.splice(foundIndex, 1)[0];
            
            // حفظ السؤال لمنع التكرار نهائياً في المرات القادمة
            saveToHistory(rawQuestion);

            // استبدال ديناميكي ذكي للضمائر السياقية والأسماء
            let finalText = rawQuestion.replace(/شريكتك|شريكك|زوجتك|زوجك/g, partnerPlayer.name);

            document.getElementById('playerName').innerText = `🔥 مَهمة الفراش الساخنة لـ [ ${activePlayer.name} ]`;
            document.getElementById('commandText').innerText = finalText;
            document.getElementById('result').classList.remove('hidden');

            // تبديل الدور بشكل منتظم
            currentTurn = currentTurn === 'p1' ? 'p2' : 'p1';
            updateTurnDisplay();
            showPoolStatus();
        }

        function newCommand() { 
            if (!isSpinning) displayResult(); 
        }

        function changeStage() {
            if (isSpinning) return;
            currentStage = currentStage === 4 ? 1 : currentStage + 1;
            updateStageTitle();
            updateProgressDots();
            document.getElementById('result').classList.add('hidden');
            showPoolStatus();
        }

        function jumpStage(s) {
            if (isSpinning) return;
            currentStage = s;
            updateStageTitle();
            updateProgressDots();
            document.getElementById('result').classList.add('hidden');

        }

        function updateStageTitle() {
            const titles = { 1: "🍹 صراحة مبللة ومثيرة", 2: "💋 مداعبات مخلصة وخافتة", 3: "🔥 اشتعال متبادل وعارم", 4: "🛌 الولوج والاتحاد الكامل" };
            document.getElementById('stageTitle').innerHTML = titles[currentStage];
        }

        function updateTurnDisplay() {
            const activePlayer = players[currentTurn];
            document.getElementById('currentTurn').innerHTML = `<i class="fa-solid fa-heart text-pink-500 ml-2"></i> الدور الحركي التالي لتقديم اللذة: <span class="text-pink-400 font-black">${activePlayer.name}</span>`;
        }

        function updateProgressDots() {
            document.querySelectorAll('#progressDots .dot').forEach(d => {
                if (parseInt(d.getAttribute('data-stage')) === currentStage) d.classList.add('active');
                else d.classList.remove('active');
            });
        }

        function showPoolStatus() {
            let left = currentRoundPool[currentStage] ? currentRoundPool[currentStage].length : 0;
            let totalHistory = getHistory().length;
            document.getElementById('poolStatus').innerText = `المتبقي في الباقة الحالية: ${left} | الأوامر المستبعدة كلياً بالذاكرة: ${totalHistory}`;
        }

        function resetAllHistory() {
            if (confirm("هل تريد مسح السجلات التاريخية بالكامل لإعادة استخدام جميع الأسئلة المحفوظة من جديد؟")) {
                clearHistory();
                generateRoundPools();
                document.getElementById('result').classList.add('hidden');
                showPoolStatus();
                alert("تم تصفير الذاكرة وتجديد اللعبة بالكامل!");
            }
        }

        function showSetup() {
            if (isSpinning) return;
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('game').classList.add('hidden');
        }
    </script>
</body>
</html>
