<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 روليت الإثارة الزوجية - النسخة الجريئة والمصححة نحوياً</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Ambient background ===== */
        .bg-ambient {
            position: fixed;
            inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(236,72,153,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 80% 80%, rgba(168,85,247,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 60% 40%, rgba(244,63,94,0.10) 0%, transparent 70%);
        }

        /* floating particles */
        .particle {
            position: fixed;
            pointer-events: none; z-index: 0;
            font-size: 1.4rem; opacity: 0;
            animation: floatUp 8s ease-in infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* ===== Glass card ===== */
        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .glass-pink {
            background: rgba(236,72,153,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(236,72,153,0.2);
        }

        /* ===== Inputs ===== */
        .fancy-input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(236,72,153,0.25);
            border-radius: 16px; color: #fff; font-size: 1.05rem;
            transition: border-color .3s, box-shadow .3s, background .3s;
            outline: none;
        }
        .fancy-input:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236,72,153,0.15), 0 0 20px rgba(236,72,153,0.1);
            background: rgba(236,72,153,0.06);
        }

        /* ===== Primary button ===== */
        .btn-primary {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #be185d, #ec4899, #a855f7);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            border: none; border-radius: 20px;
            cursor: pointer;
            font-weight: 800; letter-spacing: .5px;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 30px rgba(236,72,153,0.35);
        }
        .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(236,72,153,0.5); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
            pointer-events: none;
        }
        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        /* ===== Small action buttons ===== */
        .btn-action {
            border-radius: 14px;
            font-weight: 700; font-size: .82rem;
            padding: .9rem .4rem; cursor: pointer; transition: transform .2s, filter .2s;
            border: none;
        }
        .btn-action:hover  { transform: translateY(-2px); filter: brightness(1.15); }
        .btn-action:active { transform: translateY(0); }

        /* ===== Roulette wheel ===== */
        .wheel-wrapper {
            position: relative;
            width: 220px; height: 220px; margin: 0 auto;
        }
        .wheel-ring {
            position: absolute;
            inset: 0; border-radius: 50%;
            background: conic-gradient(
                #ec4899 0deg 60deg,  #a855f7 60deg 120deg,
                #f43f5e 120deg 180deg, #ec4899 180deg 240deg,
                #a855f7 240deg 300deg, #f43f5e 300deg 360deg
            );
            box-shadow: 0 0 40px rgba(236,72,153,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .wheel-center {
            position: absolute;
            inset: 25px; border-radius: 50%;
            background: radial-gradient(circle, #1a0a1e, #0d0010);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid rgba(236,72,153,0.3);
            box-shadow: inset 0 0 30px rgba(236,72,153,0.15);
            z-index: 5;
        }
        .wheel-arrow {
            position: absolute;
            top: -14px; left: 50%; transform: translateX(-50%);
            font-size: 2rem; filter: drop-shadow(0 0 8px #ec4899);
            animation: bounce 1s ease-in-out infinite;
            z-index: 10;
        }
        @keyframes bounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50%      { transform: translateX(-50%) translateY(-5px); }
        }

        /* ===== Result card ===== */
        .result-card {
            animation: slideUp .5s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        .pulse-ring {
            position: absolute;
            inset: -8px; border-radius: inherit;
            border: 2px solid rgba(236,72,153,0.4);
            animation: pulseRing 2s ease-out infinite;
        }
        @keyframes pulseRing {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.06); }
        }

        /* ===== Stage pill ===== */
        .stage-pill {
            display: inline-flex;
            align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 50px; font-size: .8rem; font-weight: 700;
            background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.3);
            color: #f9a8d4;
        }

        .neon-title {
            text-shadow: 0 0 20px #ec4899, 0 0 40px rgba(236,72,153,0.5);
        }

        .turn-display {
            background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(168,85,247,0.1));
            border: 1px solid rgba(236,72,153,0.2);
            border-radius: 16px; padding: 14px 20px;
            text-align: center; font-size: 1.1rem; font-weight: 700;
        }

        .command-text {
            font-size: 1.15rem;
            line-height: 2;
            background: rgba(0,0,0,0.4); border-radius: 16px;
            padding: 1.5rem; text-align: center; color: #f3f4f6;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-dots { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all .3s; cursor: pointer; }
        .dot.active { background: #ec4899; box-shadow: 0 0 10px #ec4899; transform: scale(1.2); }

        .confetti-piece {
            position: fixed;
            pointer-events: none; z-index: 999;
            width: 10px; height: 10px; border-radius: 2px;
            animation: confettiFall 2.5s ease-in forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .logo-emoji { display: inline-block; animation: logoPulse 2s ease-in-out infinite; }
        @keyframes logoPulse {
            0%,100% { transform: scale(1) rotate(0deg); }
            50%      { transform: scale(1.1) rotate(-5deg); }
        }

        .btn-spin {
            background: linear-gradient(135deg, #fff, #fce7f3);
            color: #be185d; border: none; border-radius: 14px;
            padding: 12px 32px; font-weight: 900; font-size: 1rem;
            cursor: pointer; transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 20px rgba(236,72,153,0.3);
        }
        .btn-spin:hover  { transform: scale(1.05); box-shadow: 0 6px 30px rgba(236,72,153,0.5); }
        .btn-spin:active { transform: scale(0.97); }
        .btn-spin:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        select option { background: #1a0a1e; color: #fff; }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>
    <div id="particles"></div>

    <div class="relative z-10 max-w-md mx-auto p-4 pb-12">

        <!-- ===== HEADER ===== -->
        <div class="text-center py-8">
            <div class="text-5xl mb-3">
                <span class="logo-emoji">🔥</span>
            </div>
            <h1 class="text-3xl font-black neon-title text-white mb-2">روليت الإثارة</h1>
            <p class="text-pink-400 text-sm font-medium tracking-wide">باقة جنسية صريحة · ليلة مثيرة جداً</p>
        </div>

        <!-- ===== SETUP ===== -->
        <div id="setup">
            <div class="glass rounded-3xl p-7 mb-6">
                <h2 class="text-xl font-bold text-center mb-7 text-pink-300">✨ أدخل معلوماتكما</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block mb-2 text-pink-200 text-sm font-semibold">اسم اللاعب الأول</label>
                        <input id="p1name" type="text" value="الزوج" class="fancy-input">
                    </div>
                    <div>
                        <label class="block mb-2 text-pink-200 text-sm font-semibold">نوع جنسه</label>
                        <select id="p1gender" class="fancy-input">
                            <option value="مذكر">مذكر</option>
                            <option value="مؤنث">مؤنث</option>
                        </select>
                    </div>
                    <div style="height:1px; background: linear-gradient(to left, transparent, rgba(236,72,153,0.3), transparent);"></div>
                    <div>
                        <label class="block mb-2 text-pink-200 text-sm font-semibold">اسم اللاعب الثاني</label>
                        <input id="p2name" type="text" value="الزوجة" class="fancy-input">
                    </div>
                    <div>
                        <label class="block mb-2 text-pink-200 text-sm font-semibold">نوع جنسه</label>
                        <select id="p2gender" class="fancy-input">
                            <option value="مؤنث" selected>مؤنث</option>
                            <option value="مذكر">مذكر</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="startGame()" class="btn-primary w-full py-6 text-xl text-white">
                ابدأ الليلة الساخنة 🔥
            </button>
        </div>

        <!-- ===== GAME ===== -->
        <div id="game" class="hidden">
            <div class="flex justify-between items-center mb-5">
                <button onclick="showSetup()" class="glass px-4 py-2 rounded-xl text-sm text-pink-300 font-semibold hover:bg-white/10 transition-colors">
                    ← تعديل الاسماء
                </button>
                <div id="stageTitle" class="stage-pill"></div>
            </div>

            <div id="currentTurn" class="turn-display mb-6"></div>

            <div class="progress-dots mb-6" id="progressDots">
                <div class="dot active" data-stage="1" onclick="jumpStage(1)"></div>
                <div class="dot" data-stage="2" onclick="jumpStage(2)"></div>
                <div class="dot" data-stage="3" onclick="jumpStage(3)"></div>
                <div class="dot" data-stage="4" onclick="jumpStage(4)"></div>
            </div>

            <div class="glass-pink rounded-3xl p-6 flex flex-col items-center">
                <div class="wheel-wrapper mb-5">
                    <div class="wheel-arrow">🔻</div>
                    <div class="wheel-ring" id="wheelRing"></div>
                    <div class="wheel-center">
                        <span style="font-size:2.5rem;">🎰</span>
                        <span class="text-pink-300 text-xs font-bold mt-1">دور!</span>
                    </div>
                </div>
                <button class="btn-spin" id="spinBtn" onclick="spinRoulette()">
                    🎲 لف الروليت
                </button>
            </div>

            <div id="result" class="hidden mt-6 result-card">
                <div class="relative glass-pink rounded-3xl p-7">
                    <div class="pulse-ring rounded-3xl"></div>
                    <div id="playerName" class="text-2xl font-black text-center mb-5"></div>
                    <div id="commandText" class="command-text"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mt-6">
                <button onclick="newCommand()" class="btn-action text-white" style="background:linear-gradient(135deg,#7c3aed,#a855f7)">
                    🎯<br>أمر جديد
                </button>
                <button onclick="changeStage()" class="btn-action text-white" style="background:linear-gradient(135deg,#be185d,#ec4899)">
                    ⚡<br>التالي
                </button>
                <button onclick="resetDailyPool()" class="btn-action text-white" style="background:linear-gradient(135deg,#991b1b,#ef4444)">
                    🔄<br>باقة جديدة
                </button>
            </div>
        </div>
    </div>

    <script>
        // داتا الأوامر الأصلية المحدثة كاملة وبدون أي تعديل أو اختصار لقيمها
        const masterStages = {
            1: [
                "ما هو أكثر خيال جنسي يراودك عندما تفكر في كسي/قضيبي؟", 
                "ما هي الوضعية الجنسية التي تجعل قضيبي يدخل لأعمق نقطة بداخل كسِك؟", 
                "هل تفضل نيك الكس العنيف والسرير أم نيكاً هادئاً ورومانسياً？",
                "ما هي أكثر منطقة تثير شهوتك جنسياً حول كسِك/قضيبك؟", 
                "هل تفضل مص القضيب ولحس الكس في الظلام التام أم تحت إضاءة خفيفة؟", 
                "ما هي الكلمات القذرة المثيرة التي تحب سماعها أثناء نكاح الكس؟",
                "هل مداعبة المؤخرة والشرج يثير شهوتك بشكل كبير؟", 
                "كم مرة تحب الوصول إلى الأورجازم (النشوة وتنزيل الشهوة) في ليلة واحدة؟", 
                "ما رأيك في دهن المزلق على البظر والكس بنكهات مثيرة للمص؟",
                "هل تحب الحديث القذر (Dirty Talk) عن كسّي وقضيبي أثناء الجماع؟", 
                "ما هي الحركة الجنسية التي لو فعلتها لقضيبك/كسِك تجعلك تذوب فوراً？", 
                "هل تفضل أن يسيطر شريكك على نيك الكس والنهدين أم تحب السيطرة؟",
                "ما هو اللباس الساخن أو اللانجري العاري الذي يثير شهوتك عندما يكشف نهدي وكس شريكك؟", 
                "هل تفضل نيك الكس الصباحي السريع أم النيك الليلي الطويل؟", 
                "ما هو الجزء الذي تحب مصه ولحسه في كسّي/قضيبي؟",
                "هل سبق لك وأن تخيلت نيك كسّي/قضيبي بعنف في مكان مضاء؟", 
                "ما هي المدة المثالية التي تفضلها لمص القضيب ولحس الكس قبل الإدخال؟", 
                "هل تحب أن يقوم شريكك بابتلاع المني أو سوائل الكس الخاصة بك؟",
                "ما هو المكان الأكثر جنوناً في المنزل الذي ترغب بنكاح الكس ومص القضيب فيه؟", 
                "هل يثيرك أن ترى شريكك يفرك كسه/يقبض على قضيبه ويمارس العادة السرية أمامك؟", 
                "ما هو شعورك عندما أعض نهودك أو قضيبك/كسك بلطف أثناء الشبق؟",
                "هل تفضل القبلات العميقة المبللة أم مص اللسان والشفرات؟", 
                "ما هو أكثر تصرف يطفئ شهوتك تماماً أثناء نيك الكس؟", 
                "هل تحب أن يمسك شريكك شعرك ويشد عليه بينما يدخل قضيبه في كسك بعنف؟",
                "ما هو تقييمك لشهوتك وجوعك الجنسي لنيك الكس من 10؟", 
                "هل تحب أن تسمع صوت آهات وصراخ شريكك بوضوح عند إدخال القضيب؟", 
                "ما هو العطر أو رائحة العرق التي تثير رغبتك في لحس الكس أو مص القضيب؟",
                "هل تفضل إزالة الشعر بالكامل ليكون الكس والقضيب عاريين تماماً للحس Bih؟", 
                "ما هي الوضعية التي تجعل قضيبك يطلق المني/يجعل كسك ينزل شهوته بشكل أسرع؟", 
                "هل تحب النظر مباشرة في عيني شريكك أثناء إدخال القضيب بداخل الكس？",
                "ما هو الجزء الأقل إثارة بالنسبة لك في جسد شريكك العاري؟", 
                "هل تفضل الاستحمام ولحس الأجساد معاً قبل النيك أم بعده؟", 
                "ما هو أكثر شيء يثيرك في مؤخرة شريكك وشق استه؟",
                "هل تحب مساج الزيت الساخن على النهود والكس والمؤخرة كجزء من المداعبة؟", 
                "ما هي الفكرة الجنسية الجريئة عن الكس/القضيب التي تخجل من طلبها؟", 
                "هل تفضل اللمس الخفيف للبظر والقضيب أم الضغط القوي المثير؟",
                "ما هو شعورك الصريح تجاه ابتلاع لبن القضيب (المني) أو لحس مياه الكس؟", 
                "هل تحب النوم عارياً وقضيبك يلامس كسي دائماً؟", 
                "ما هي الأجواء التي تراها مثيرة لليلة نيك ومص جنونية؟",
                "هل تفضل أن تمزق ملابسك الداخلية وتعرية كسك/قضيبك بعنف في السرير؟", 
                "ما هي أكثر لحظة نكنا فيها الكس بعنف ولا يمكنك نسيانها أبداً؟", 
                "هل يثيرك أن يطلب منك شريكك مص قضيبه أو لحس بظرها فوراً؟",
                "ما هي الحركة التي تجعل كسك/قضيبك يرتعش من شدة اللذة الجنسية？", 
                "هل تفضل نيك الكس في السرير أم تفضل التنويع (الكنبة، الأرض، المطبخ)؟", 
                "هل تحب المص المفاجئ في الرقبة والنهود أثناء انشغالك بامر آخر؟",
                "ما هو التصرف الذي لو فعلته الآن لقضيبك/كسِك ستفقد السيطرة وتطلب النيك فوراً؟", 
                "هل تحب رؤية قضيبك وهو يدخل ويخرج من كسي في المرآة؟", 
                "ما هو رأيك في مص ولعق أصابع والنهود؟",
                "هل تفضل علاقة نيك سريعة ومفاجئة (Spontaneous) أم مخططة؟", 
                "هل تريد تصوير ليلتكم الجنسيه",
                "أوصف بصراحة: ما الذي يميز كسي/قضيبي في الفراش ويجعلك تذوب شهوة؟"
            ],
            2: [
                "قبل شريكك بعمق وبطء شديد مع دفع أنفاس ساخنة في فمه لمدة دقيقة", 
                "عض شفتي شريكك السفلى برفق شديد ومصها أثناء التقبيل الساخن", 
                "قبل رقبة شريكك بعمق واصنع علامة مص حمراء واضحة", 
                "اهمس في أذن شريكك بأكثر جملة قذرة وجنسية تثير قضيبه/كسها", 
                "أنزل ملابس شريكك الداخلية ببطء شديد وأنت تتأمل كسه/قضيبها أمام المرآة والنور شغال", 
                "قف خلف شريكك عارياً وقم بضمّه وتحريك قضيبك/كسك على مؤخرته", 
                "أمسك وجه شريكك بيديك وقبله قبلة فرنسية عميقة مع مص لساته بلعاب كثيف", 
                "قم بتمرير لسانك على طول رقبة شريكك ونزولاً حتى صدره ونهديه", 
                "امسح بيدك على فخذ شريكك من الداخل واقترب بإنش واحد من كسه/قضيبه دون لمسه", 
                "اجلس في حضن شريكك وقم بالاحتكاك بقضيبه/كسها ببطء عارياً وأنت تقبله",
                "انزع قطعة واحدة من ملابسك الداخلية بشكل جنسي ومثير أمام شريكك والنور شغال", 
                "قم بعض شحمة أذن شريكك بلطف مع إصدار آهة جنسية عالية", 
                "دع شريكك يستلقي وقم بعمل مساج لنهديه أو صدره باستخدام شفتيك ولسانك فقط",

            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        function generateDailyPool() {
            for (let s in masterStages) {
                let items = [...masterStages[s]];
                items.sort(() => Math.random() - 0.5);
                dynamicPool[s] = items.slice(0, 8); 
            }
        }
        generateDailyPool();

        function startGame() {
            const p1n = document.getElementById('p1name').value.trim();
            const p2n = document.getElementById('p2name').value.trim();

            if (!p1n || !p2n) {
                alert("الرجاء إدخال أسماء اللاعبين أولاً!");
                return;
            }

            players.p1.name = p1n;
            players.p1.gender = document.getElementById('p1gender').value;
            players.p2.name = p2n;
            players.p2.gender = document.getElementById('p2gender').value;

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');

            updateStageTitle();
            updateTurnDisplay();
        }

        function updateStageTitle() {
            const titles = { 1: "صراحة جريئة", 2: "مداعبات ساخنة", 3: "إثارة جنونية", 4: "علاقة كاملة" };
            document.getElementById('stageTitle').innerHTML = `المرحلة ${currentStage}: ${titles[currentStage]}`;
        }

        function updateTurnDisplay() {
            const activePlayer = players[currentTurn];
            document.getElementById('currentTurn').innerHTML = `الدور الآن على: <span class="text-pink-400 font-black text-xl">${activePlayer.name}</span> <span class="text-xs text-gray-400">(${activePlayer.gender})</span>`;
        }

        function updateProgressDots() {
            const dots = document.querySelectorAll('.progress-dots .dot');
            dots.forEach(d => {
                if (parseInt(d.getAttribute('data-stage')) === currentStage) {
                    d.classList.add('active');
                } else {
                    d.classList.remove('active');
                }
            });
        }

        function jumpStage(s) {
            if (isSpinning) return;
            currentStage = s;
            updateStageTitle();
            updateProgressDots();
            document.getElementById('result').classList.add('hidden');
        }

        function spinRoulette() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').classList.add('hidden');

            const extraDeg = Math.floor(Math.random() * 360) + 1440;
            currentRotation += extraDeg;
            document.getElementById('wheelRing').style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                triggerConfetti();
                displayResult();
            }, 3000);
        }

        function displayResult() {
            const activePlayer = players[currentTurn];
            const partnerPlayer = currentTurn === 'p1' ? players.p2 : players.p1;
            let pool = dynamicPool[currentStage];

            if (!pool || pool.length === 0) {
                let items = [...masterStages[currentStage]];
                items.sort(() => Math.random() - 0.5);
                dynamicPool[currentStage] = items.slice(0, 8);
                pool = dynamicPool[currentStage];
            }

            let selectedRaw = pool.shift();
            let finalText = "";

            // الفلترة بناءً على الجنس للأشياء التي هي عبارة عن كائنات (Objects)
            if (selectedRaw && typeof selectedRaw === 'object') {
                let genderKey = activePlayer.gender; 
                if (selectedRaw[genderKey]) {
                    finalText = selectedRaw[genderKey];
                } else if (selectedRaw['mذكر'] && genderKey === 'مذكر') {
                    finalText = selectedRaw['mذكر']; 
                } else {
                    finalText = selectedRaw["مذكر"] || selectedRaw["مؤنث"];
                }
            } else {
                finalText = selectedRaw || "تجاوز هذا الدور أو قم بتقبيل شريكك بعمق!";
            }

            // تفعيل محرك التصحيح النحوي الذكي قبل العرض
            finalText = fixGrammarAndContext(finalText, activePlayer, partnerPlayer);

            document.getElementById('playerName').innerHTML = `🔥 مَهمة السرير لـ [ ${activePlayer.name} ]`;
            document.getElementById('commandText').innerText = finalText;
            document.getElementById('result').classList.remove('hidden');

            // تبديل الدور تلقائياً للمرة القادمة
            currentTurn = currentTurn === 'p1' ? 'p2' : 'p1';
            updateTurnDisplay();
        }

        function newCommand() {
            if (isSpinning) return;
            displayResult();
        }

        function changeStage() {
            if (isSpinning) return;
            currentStage = currentStage === 4 ? 1 : currentStage + 1;
            updateStageTitle();
            updateProgressDots();
            document.getElementById('result').classList.add('hidden');
        }

        function resetDailyPool() {
            if (isSpinning) return;
            if (confirm("هل ترغب في سحب باقة يومية جديدة (8 أسئلة جديدة لكل مرحلة) دون تكرار ما لعبتوه سابقاً؟")) {
                generateDailyPool();
                currentStage = 1;
                updateStageTitle();
                updateProgressDots();
                document.getElementById('result').classList.add('hidden');
            }
        }

        function showSetup() {
            if (isSpinning) return;
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('game').classList.add('hidden');
        }

        function triggerConfetti() {
            const colors = ['#ec4899', '#a855f7', '#f43f5e', '#ff007f', '#fff'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti-piece';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.background = colors[Math.floor(Math.random() * colors.length)];
                conf.style.transform = `scale(${Math.random() * 0.6 + 0.5})`;
                conf.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }
